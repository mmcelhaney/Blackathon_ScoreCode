<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Blackathon · BlackWPT Hackathon 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold:  #F5C518;
  --gold2: #D4A017;
  --gold3: #A37810;
  --red:   #C0392B;
  --green: #27AE60;
  --ink:   #080808;
  --ink2:  #111;
  --text:  #F0E6CC;
  --muted: #5A5040;
  --border: rgba(245,197,24,.15);
}

/* ── BASE ── */
html, body { height: 100%; }
body {
  background: var(--ink);
  font-family: 'Barlow', sans-serif;
  color: var(--text);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100%;
  overflow: hidden;
  position: relative;
}

/* ── LAYERED BACKGROUND ── */
.bg-grid {
  position: fixed; inset: 0; z-index: 0;
  background-image:
    repeating-linear-gradient(0deg,   transparent, transparent 59px, rgba(245,197,24,.04) 60px),
    repeating-linear-gradient(90deg,  transparent, transparent 59px, rgba(245,197,24,.04) 60px);
  pointer-events: none;
}
.bg-radial {
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(ellipse 70% 60% at 50% 50%,
    rgba(212,160,23,.10) 0%,
    rgba(192,57,43,.05)  40%,
    transparent          70%);
  pointer-events: none;
}
.bg-vignette {
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(ellipse 120% 120% at 50% 50%,
    transparent 40%, rgba(0,0,0,.85) 100%);
  pointer-events: none;
}

/* ── CORNER ACCENTS ── */
.corner {
  position: fixed; width: 80px; height: 80px;
  z-index: 1; opacity: .4;
}
.corner-tl { top: 20px; left: 20px;
  border-top: 1px solid var(--gold); border-left: 1px solid var(--gold); }
.corner-tr { top: 20px; right: 20px;
  border-top: 1px solid var(--gold); border-right: 1px solid var(--gold); }
.corner-bl { bottom: 20px; left: 20px;
  border-bottom: 1px solid var(--gold); border-left: 1px solid var(--gold); }
.corner-br { bottom: 20px; right: 20px;
  border-bottom: 1px solid var(--gold); border-right: 1px solid var(--gold); }

/* ── SCAN-LINE OVERLAY ── */
.scanlines {
  position: fixed; inset: 0; z-index: 1;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,.06) 2px,
    rgba(0,0,0,.06) 4px
  );
  pointer-events: none;
}

/* ── CONTENT ── */
.stage {
  position: relative; z-index: 10;
  display: flex; flex-direction: column; align-items: center;
  gap: 0;
  animation: fadeUp .9s cubic-bezier(.16,1,.3,1) both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(30px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Event tag */
.event-tag {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: .65rem; letter-spacing: 5px; text-transform: uppercase;
  color: var(--muted);
  border: 1px solid var(--border);
  padding: 5px 18px 4px;
  border-radius: 2px;
  margin-bottom: 28px;
  animation: fadeUp .9s .1s cubic-bezier(.16,1,.3,1) both;
}

/* Hex logo */
.hex-wrap {
  position: relative;
  width: 90px; height: 90px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 20px;
  animation: fadeUp .9s .15s cubic-bezier(.16,1,.3,1) both;
}
.hex-ring {
  position: absolute; inset: 0;
  border-radius: 50%;
  border: 1px solid rgba(245,197,24,.3);
  animation: pulse 3s ease-in-out infinite;
}
.hex-ring-2 {
  position: absolute; inset: -10px;
  border-radius: 50%;
  border: 1px solid rgba(245,197,24,.12);
  animation: pulse 3s .6s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: .4; transform: scale(1); }
  50%       { opacity: 1;  transform: scale(1.04); }
}
.hex-icon {
  font-size: 3.2rem; line-height: 1;
  filter: drop-shadow(0 0 18px rgba(245,197,24,.5));
}

/* Title */
.title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(4rem, 14vw, 8rem);
  letter-spacing: 8px;
  line-height: .92;
  text-align: center;
  background: linear-gradient(160deg,
    #fff     0%,
    var(--gold)  30%,
    var(--gold2) 60%,
    var(--gold3) 100%
  );
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  filter: drop-shadow(0 0 30px rgba(245,197,24,.25));
  animation: fadeUp .9s .2s cubic-bezier(.16,1,.3,1) both;
}

/* Subtitle / date strip */
.subtitle-row {
  display: flex; align-items: center; gap: 16px;
  margin-top: 16px; margin-bottom: 44px;
  animation: fadeUp .9s .3s cubic-bezier(.16,1,.3,1) both;
}
.subtitle-line { width: 40px; height: 1px; background: var(--border); }
.subtitle {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: .75rem; letter-spacing: 4px; text-transform: uppercase;
  color: var(--muted);
}

/* ── THE BUTTON ── */
.launch-btn {
  position: relative;
  padding: 0 52px;
  height: 68px;
  background: none;
  border: none;
  cursor: pointer;
  text-decoration: none;
  display: inline-flex; align-items: center; justify-content: center;
  animation: fadeUp .9s .4s cubic-bezier(.16,1,.3,1) both;
  -webkit-tap-highlight-color: transparent;
}

/* Gold border that animates on hover */
.launch-btn::before {
  content: '';
  position: absolute; inset: 0;
  border: 1.5px solid var(--gold2);
  transition: border-color .2s, box-shadow .2s;
}
.launch-btn::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, var(--gold2), var(--gold));
  opacity: 0;
  transition: opacity .2s;
}
.launch-btn:hover::before { border-color: var(--gold); box-shadow: 0 0 30px rgba(245,197,24,.25), inset 0 0 30px rgba(245,197,24,.08); }
.launch-btn:hover::after  { opacity: 1; }
.launch-btn:active { transform: scale(.97); }

.btn-inner {
  position: relative; z-index: 1;
  display: flex; align-items: center; gap: 14px;
  transition: color .2s;
}
.btn-label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.5rem; letter-spacing: 5px; text-transform: uppercase;
  color: var(--gold);
  transition: color .2s;
}
.btn-arrow {
  font-size: 1.1rem; color: var(--gold2);
  transition: color .2s, transform .2s;
}
.launch-btn:hover .btn-label,
.launch-btn:hover .btn-arrow { color: #0A0A0A; }
.launch-btn:hover .btn-arrow { transform: translateX(4px); }

/* Corner ticks on the button */
.btn-tick {
  position: absolute; width: 8px; height: 8px;
  border-color: var(--gold3); border-style: solid; border-width: 0;
  transition: border-color .2s;
}
.launch-btn:hover .btn-tick { border-color: #0A0A0A; }
.btn-tick.tl { top: -1px;  left: -1px;  border-top-width:    1.5px; border-left-width:  1.5px; }
.btn-tick.tr { top: -1px;  right: -1px; border-top-width:    1.5px; border-right-width: 1.5px; }
.btn-tick.bl { bottom: -1px; left: -1px;  border-bottom-width: 1.5px; border-left-width:  1.5px; }
.btn-tick.br { bottom: -1px; right: -1px; border-bottom-width: 1.5px; border-right-width: 1.5px; }

/* ── ACCENT BAR ── */
.accent-bar {
  width: 120px; height: 2px;
  background: linear-gradient(90deg, var(--red), var(--gold), var(--green));
  border-radius: 2px;
  margin-top: 52px;
  opacity: .7;
  animation: fadeUp .9s .5s cubic-bezier(.16,1,.3,1) both;
}

/* ── FOOTER ── */
.footer {
  position: fixed; bottom: 28px; left: 0; right: 0;
  text-align: center; z-index: 10;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: .6rem; letter-spacing: 3px; text-transform: uppercase;
  color: var(--muted);
  animation: fadeUp .9s .6s cubic-bezier(.16,1,.3,1) both;
}

/* ── FLOATING PARTICLES ── */
.particle {
  position: fixed; border-radius: 50%;
  background: var(--gold);
  opacity: 0;
  pointer-events: none; z-index: 2;
  animation: drift linear infinite;
}
@keyframes drift {
  0%   { opacity: 0;    transform: translateY(0)      scale(1); }
  10%  { opacity: .4; }
  90%  { opacity: .15; }
  100% { opacity: 0;    transform: translateY(-100vh) scale(.4); }
}

/* ── MOBILE ── */
@media (max-width: 480px) {
  .corner { width: 50px; height: 50px; }
  .event-tag { font-size: .58rem; letter-spacing: 4px; }
  .hex-icon { font-size: 2.4rem; }
  .subtitle { font-size: .65rem; letter-spacing: 3px; }
  .launch-btn { height: 60px; padding: 0 36px; }
  .btn-label { font-size: 1.25rem; letter-spacing: 4px; }
  .accent-bar { margin-top: 40px; }
}
</style>
</head>
<body>

<!-- Background layers -->
<div class="bg-grid"></div>
<div class="bg-radial"></div>
<div class="bg-vignette"></div>
<div class="scanlines"></div>

<!-- Corner brackets -->
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<!-- Particles (injected by JS) -->
<div id="particles"></div>

<!-- Main content -->
<div class="stage">

  <div class="event-tag">BlackWPT Hackathon &nbsp;·&nbsp; April 24, 2026</div>

  <div class="hex-wrap">
    <div class="hex-ring"></div>
    <div class="hex-ring-2"></div>
    <div class="hex-icon">⬡</div>
  </div>

  <div class="title">Blackathon</div>

  <div class="subtitle-row">
    <div class="subtitle-line"></div>
    <div class="subtitle">Score Card System</div>
    <div class="subtitle-line"></div>
  </div>

  <a class="launch-btn" href="blackathon_scorecard.html">
    <div class="btn-tick tl"></div>
    <div class="btn-tick tr"></div>
    <div class="btn-tick bl"></div>
    <div class="btn-tick br"></div>
    <div class="btn-inner">
      <span class="btn-label">Launch Score Card</span>
      <span class="btn-arrow">→</span>
    </div>
  </a>

  <div class="accent-bar"></div>

</div>

<div class="footer">Powered by BlackWPT &nbsp;·&nbsp; All rights reserved</div>

<script>
/* Floating gold particles */
const container = document.getElementById('particles');
const count = 18;
for (let i = 0; i < count; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  const size = Math.random() * 3 + 1;
  const left = Math.random() * 100;
  const dur  = Math.random() * 18 + 12;
  const del  = Math.random() * -20;
  Object.assign(p.style, {
    width:  size + 'px',
    height: size + 'px',
    left:   left + '%',
    bottom: '-10px',
    animationDuration: dur + 's',
    animationDelay:    del + 's',
  });
  container.appendChild(p);
}
</script>
</body>
</html>
